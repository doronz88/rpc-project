  <rect x="186" y="114" width="28" height="28" rx="6" fill="#ffffff"/>
  <!-- parentheses = call() -->
  <path d="M118 78 C92 100 92 156 118 178" fill="none" stroke="#1f2430" stroke-width="11" stroke-linecap="round"/>
  <path d="M138 78 C164 100 164 156 138 178" fill="none" stroke="#1f2430" stroke-width="11" stroke-linecap="round"/>
