<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- connection line -->
  <line x1="74" y1="128" x2="182" y2="128" stroke="#5b6cf0" stroke-width="10" stroke-linecap="round"/>
  <!-- local node -->
  <circle cx="56" cy="128" r="30" fill="#5b6cf0"/>
  <circle cx="56" cy="128" r="11" fill="#ffffff"/>
  <!-- remote node -->
