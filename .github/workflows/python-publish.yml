# Builds the rpcclient package and uploads it to PyPI via Trusted Publishing (OIDC).
# No API tokens/secrets are used — PyPI authenticates the workflow over OIDC.
# Requires a Trusted Publisher configured on PyPI for this project pointing at
# repo `doronz88/rpc-project`, workflow `python-publish.yml`, environment `pypi`.
# See: https://docs.pypi.org/trusted-publishers/

name: Upload Python Package

on:
  release:
    types: [created]

jobs:
  deploy:

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/rpcclient

    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)

    defaults:
      run:
        working-directory: ./src/rpcclient

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Build dependencies
      run: |
        python3 -m pip install mypy-protobuf protobuf grpcio-tools
        make -C ../protos/ python_protos

        python -m pip install --upgrade pip
        pip install -U build setuptools wheel
    - name: Build
      run: python -m build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: src/rpcclient/dist
